<div class="card">

  <h3>{{ product.name }}</h3>

  <p><strong>Brand:</strong> {{ product.brand }}</p>

  <p><strong>Price:</strong> PKR {{ product.price }}</p>

  <p><strong>Rating:</strong> ⭐ {{ product.rating }}</p>

  <button [routerLink]="['/products', product.id]">
    View Details
  </button>

</div>
